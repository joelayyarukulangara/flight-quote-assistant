name: Build and publish release

# Builds Windows + macOS (both architectures), then publishes all of them
# to a GitHub Release attached to the pushed tag. Release assets are
# public, permanent download links that work for anyone -- no GitHub
# account or login required, unlike plain workflow-run artifacts.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "FlightQuoteAssistant" `
            --collect-all customtkinter `
            --hidden-import PIL._tkinter_finder `
            main.py

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/FlightQuoteAssistant.exe
          retention-days: 5

  # NOTE: only Apple Silicon (macos-14) is built. macos-13 (Intel) was
  # dropped -- GitHub's hosted Intel macOS runners have effectively been
  # phased out, and a job targeting one just sits at "queued" forever with
  # no runner ever picking it up. That blocked publish-release indefinitely
  # since it waited on every matrix leg to finish. If Intel Mac support is
  # needed later, it'll require a different runner source (self-hosted, or
  # a paid macOS CI provider) rather than GitHub's free hosted pool.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Python with working Tcl/Tk (not actions/setup-python)
        run: |
          # actions/setup-python's macOS builds are not reliably linked
          # against a working Tk framework -- apps built with them tend to
          # crash almost immediately on launch on modern macOS. Homebrew's
          # python-tk formula installs a Python build with proper Tcl/Tk
          # 8.6 support instead. Resolve its bin path explicitly rather
          # than assuming python3.11 lands on PATH, since Homebrew's
          # versioned formulae are sometimes keg-only.
          brew install python-tk@3.11
          PY_BIN="$(brew --prefix python@3.11)/bin/python3.11"
          echo "PY_BIN=$PY_BIN" >> "$GITHUB_ENV"
          "$PY_BIN" -c "import tkinter; print('Tk version:', tkinter.TkVersion)"

      - name: Install dependencies
        run: |
          "$PY_BIN" -m pip install --upgrade pip
          "$PY_BIN" -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          "$PY_BIN" -m PyInstaller --noconfirm --windowed --name "FlightQuoteAssistant" \
            --collect-all customtkinter \
            --hidden-import PIL._tkinter_finder \
            main.py

      - name: Zip the .app bundle for release
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent FlightQuoteAssistant.app \
            "FlightQuoteAssistant-macOS-apple-silicon.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-apple-silicon
          path: dist/FlightQuoteAssistant-macOS-apple-silicon.zip
          retention-days: 5

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Rename Windows exe for clarity
        run: mv release-assets/FlightQuoteAssistant.exe release-assets/FlightQuoteAssistant-Windows.exe

      - name: List assets to publish
        run: ls -la release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" release-assets/* \
            --title "Flight Quote Assistant ${{ github.ref_name }}" \
            --notes "Download the file for your OS below -- no installer needed, just run it.

          - **Windows**: \`FlightQuoteAssistant-Windows.exe\`
          - **Mac (Apple Silicon / M1-M4)**: \`FlightQuoteAssistant-macOS-apple-silicon.zip\`

          Intel Mac builds aren't currently available (GitHub's hosted Intel macOS runners have been phased out). Apple Silicon covers virtually all Macs sold since late 2020.

          Works fully offline with mock flight data out of the box. Add a SerpAPI key in Settings for live fares (optional)."
