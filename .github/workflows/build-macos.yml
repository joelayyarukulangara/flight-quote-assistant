name: Build macOS app

# Builds a standalone macOS .app bundle of Flight Quote Assistant using
# PyInstaller on GitHub's macOS runners (PyInstaller cannot cross-compile,
# so the build must actually run on macOS).
#
# Trigger manually from the Actions tab ("Run workflow"), or automatically
# on every push to main. The built .app is uploaded as a downloadable
# workflow artifact.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/build-macos.yml"

jobs:
  # NOTE: only Apple Silicon (macos-14) is built. macos-13 (Intel) was
  # dropped -- GitHub's hosted Intel macOS runners have effectively been
  # phased out, so a job targeting one just sits at "queued" forever with
  # no runner ever picking it up.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Python with working Tcl/Tk (not actions/setup-python)
        run: |
          # actions/setup-python's macOS builds are not reliably linked
          # against a working Tk framework -- apps built with them tend to
          # crash almost immediately on launch on modern macOS. Homebrew's
          # python-tk formula installs a Python build with proper Tcl/Tk
          # 8.6 support instead. Resolve its bin path explicitly rather
          # than assuming python3.11 lands on PATH, since Homebrew's
          # versioned formulae are sometimes keg-only.
          brew install python-tk@3.11
          PY_BIN="$(brew --prefix python@3.11)/bin/python3.11"
          echo "PY_BIN=$PY_BIN" >> "$GITHUB_ENV"
          "$PY_BIN" -c "import tkinter; print('Tk version:', tkinter.TkVersion)"

      - name: Install dependencies
        run: |
          "$PY_BIN" -m pip install --upgrade pip
          "$PY_BIN" -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          "$PY_BIN" -m PyInstaller --noconfirm --windowed --name "FlightQuoteAssistant" \
            --collect-all customtkinter \
            --hidden-import PIL._tkinter_finder \
            main.py

      - name: Stage only the .app bundle for upload
        run: |
          # --windowed on macOS leaves both dist/FlightQuoteAssistant/ (raw
          # onedir build) and dist/FlightQuoteAssistant.app (the bundle) --
          # copy only the .app into its own folder so the artifact contains
          # nothing else to confuse a downloader.
          mkdir -p artifact_stage
          cp -R dist/FlightQuoteAssistant.app artifact_stage/

      - uses: actions/upload-artifact@v4
        with:
          name: FlightQuoteAssistant-macOS-apple-silicon
          path: artifact_stage
          retention-days: 30
          # actions/upload-artifact uploads a directory's *contents*, not
          # the directory itself -- so pointing at artifact_stage (which
          # contains only FlightQuoteAssistant.app) means downloaders get
          # exactly that one named .app folder after a single unzip.
